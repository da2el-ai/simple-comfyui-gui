<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple ComfyUI GUI</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 20px;
        background: #f8fafc;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
      }

      input {
        padding: 8px 10px;
        font-size: 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      button {
        padding: 8px 12px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .btn-connect {
        background: #2563eb;
        color: #fff;
      }

      .btn-open {
        background: #0f766e;
        color: #fff;
      }

      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .status {
        min-height: 20px;
        font-size: 13px;
      }

      .qr-section {
        display: none;
        flex-direction: column;
        gap: 8px;
        padding-top: 8px;
      }

      .qr-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tags-tools {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }

      .btn-create-tags {
        background: #1d4ed8;
        color: #fff;
      }

      .qr-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .qr-image {
        width: 120px;
        height: 120px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
      }

      .qr-url {
        font-size: 12px;
        color: #334155;
        word-break: break-all;
      }

      .success {
        color: #15803d;
      }

      .error {
        color: #dc2626;
      }

      .confirm-dialog {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 16px;
        min-width: 320px;
      }

      .confirm-dialog::backdrop {
        background: rgba(15, 23, 42, 0.35);
      }

      .confirm-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      .btn-cancel {
        background: #64748b;
        color: #fff;
      }

      .btn-confirm {
        background: #2563eb;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <label for="comfyui-url">ComfyUI URL</label>
      <input id="comfyui-url" type="text" value="http://localhost:8188" />

      <button id="connect" class="btn-connect">ComfyUIに接続</button>
      <div id="status" class="status"></div>

      <button id="open" class="btn-open" disabled>SimpleComfyUIを起動</button>

      <section id="qr-section" class="qr-section">
        <label>QRコード</label>
        <div id="qr-list" class="qr-list"></div>

        <div class="tags-tools">
          <label for="tags-file-url">タグファイルURL</label>
          <input
            id="tags-file-url"
            type="text"
            value="https://gist.githubusercontent.com/pythongosssss/1d3efa6050356a08cea975183088159a/raw/a18fb2f94f9156cf4476b0c24a09544d6c0baec6/danbooru-tags.txt"
          />
          <button id="create-tags-file" class="btn-create-tags">オートコンプリートタグファイルを作成</button>
        </div>
      </section>

    </main>

    <dialog id="overwrite-confirm-dialog" class="confirm-dialog">
      <div>すでに存在しますが上書きしますか？</div>
      <div class="confirm-actions">
        <button id="overwrite-cancel" class="btn-cancel">キャンセル</button>
        <button id="overwrite-ok" class="btn-confirm">上書きする</button>
      </div>
    </dialog>

    <dialog id="info-dialog" class="confirm-dialog">
      <div id="info-message"></div>
      <div class="confirm-actions">
        <button id="info-ok" class="btn-confirm">OK</button>
      </div>
    </dialog>

    <script>
      const connectButton = document.getElementById("connect");
      const openButton = document.getElementById("open");
      const statusElement = document.getElementById("status");
      const urlInput = document.getElementById("comfyui-url");
      const qrSection = document.getElementById("qr-section");
      const qrList = document.getElementById("qr-list");
      const createTagsFileButton = document.getElementById("create-tags-file");
      const tagsFileURLInput = document.getElementById("tags-file-url");
      const overwriteConfirmDialog = document.getElementById("overwrite-confirm-dialog");
      const overwriteCancelButton = document.getElementById("overwrite-cancel");
      const overwriteOkButton = document.getElementById("overwrite-ok");
      const infoDialog = document.getElementById("info-dialog");
      const infoMessage = document.getElementById("info-message");
      const infoOkButton = document.getElementById("info-ok");
      const defaultConnectButtonLabel = "ComfyUIに接続";
      const defaultCreateTagsFileButtonLabel = "オートコンプリートタグファイルを作成";

      let connectedURL = "";

      function setConnecting(isConnecting) {
        connectButton.disabled = isConnecting;
        urlInput.disabled = isConnecting;
        connectButton.textContent = isConnecting ? "接続中..." : defaultConnectButtonLabel;
      }

      function setCreatingTagsFile(isCreating) {
        createTagsFileButton.disabled = isCreating;
        tagsFileURLInput.disabled = isCreating;
        createTagsFileButton.textContent = isCreating ? "作成中..." : defaultCreateTagsFileButtonLabel;
      }

      async function loadSavedComfyUIURL() {
        try {
          const savedURL = await window.go.main.App.GetSavedComfyUIURL();
          if (savedURL && typeof savedURL === "string") {
            urlInput.value = savedURL;
          }
        } catch (_error) {
        }
      }

      async function loadDefaultTagsFileURL() {
        try {
          const defaultURL = await window.go.main.App.GetDefaultTagsFileURL();
          if (defaultURL && typeof defaultURL === "string") {
            tagsFileURLInput.value = defaultURL;
          }
        } catch (_error) {
        }
      }

      function setStatus(message, type) {
        statusElement.textContent = message;
        statusElement.classList.remove("success", "error");
        if (type) {
          statusElement.classList.add(type);
        }
      }

      function hideQRCode() {
        qrSection.style.display = "none";
        qrList.innerHTML = "";
      }

      function confirmOverwrite() {
        if (!overwriteConfirmDialog || typeof overwriteConfirmDialog.showModal !== "function") {
          return Promise.resolve(window.confirm("すでに存在しますが上書きしますか？"));
        }

        return new Promise((resolve) => {
          const cleanup = () => {
            overwriteCancelButton.removeEventListener("click", onCancel);
            overwriteOkButton.removeEventListener("click", onConfirm);
            overwriteConfirmDialog.removeEventListener("cancel", onCancelEvent);
            overwriteConfirmDialog.removeEventListener("close", onClose);
          };

          const onCancel = () => {
            cleanup();
            overwriteConfirmDialog.close();
            resolve(false);
          };

          const onConfirm = () => {
            cleanup();
            overwriteConfirmDialog.close();
            resolve(true);
          };

          const onCancelEvent = (event) => {
            event.preventDefault();
            cleanup();
            overwriteConfirmDialog.close();
            resolve(false);
          };

          const onClose = () => {
            cleanup();
            resolve(overwriteConfirmDialog.returnValue === "confirm");
          };

          overwriteCancelButton.addEventListener("click", onCancel);
          overwriteOkButton.addEventListener("click", onConfirm);
          overwriteConfirmDialog.addEventListener("cancel", onCancelEvent);
          overwriteConfirmDialog.addEventListener("close", onClose);
          overwriteConfirmDialog.showModal();
        });
      }

      function showInfoDialog(message) {
        if (!infoDialog || !infoMessage || !infoOkButton || typeof infoDialog.showModal !== "function") {
          window.alert(message);
          return Promise.resolve();
        }

        infoMessage.textContent = message;

        return new Promise((resolve) => {
          const onOk = () => {
            infoDialog.close();
          };

          const onClose = () => {
            infoOkButton.removeEventListener("click", onOk);
            infoDialog.removeEventListener("close", onClose);
            resolve();
          };

          infoOkButton.addEventListener("click", onOk);
          infoDialog.addEventListener("close", onClose);
          infoDialog.showModal();
        });
      }

      async function showQRCode() {
        const result = await window.go.main.App.GetQRCodes();
        if (!result.success) {
          hideQRCode();
          setStatus(result.message, "error");
          return;
        }

        if (!result.items || result.items.length === 0) {
          hideQRCode();
          return;
        }

        qrList.innerHTML = "";
        for (const item of result.items) {
          const rowElement = document.createElement("div");
          rowElement.className = "qr-row";

          const imageElement = document.createElement("img");
          imageElement.className = "qr-image";
          imageElement.alt = "QRコード";
          imageElement.src = item.qrCodeDataUrl;

          const urlElement = document.createElement("div");
          urlElement.className = "qr-url";
          urlElement.textContent = item.accessUrl;

          rowElement.appendChild(imageElement);
          rowElement.appendChild(urlElement);
          qrList.appendChild(rowElement);
        }

        qrSection.style.display = "flex";
      }

      async function connectComfyUI(options = { auto: false }) {
        const isAuto = Boolean(options.auto);
        setConnecting(true);

        if (isAuto) {
          setStatus("保存済みURLで接続を確認しています...", null);
        } else {
          setStatus("", null);
        }

        try {
          const result = await window.go.main.App.CheckConnection(urlInput.value);
          if (!result.success) {
            connectedURL = "";
            openButton.disabled = true;
            hideQRCode();
            setStatus("接続失敗: " + result.message, "error");
            return;
          }

          connectedURL = urlInput.value.trim();
          openButton.disabled = false;
          setStatus(result.message, "success");
          await showQRCode();
        } catch (error) {
          connectedURL = "";
          openButton.disabled = true;
          hideQRCode();
          setStatus("接続失敗: " + String(error), "error");
        } finally {
          setConnecting(false);
        }
      }

      connectButton.addEventListener("click", async () => {
        await connectComfyUI();
      });

      urlInput.addEventListener("input", () => {
        const currentURL = urlInput.value.trim();
        if (connectedURL && currentURL !== connectedURL) {
          openButton.disabled = true;
          hideQRCode();
          setStatus("URLが変更されました。再接続してください。", "error");
        }
      });

      openButton.addEventListener("click", async () => {
        try {
          const result = await window.go.main.App.OpenSimpleComfyUI();
          if (!result.success) {
            setStatus(result.message, "error");
            return;
          }

          setStatus(result.message, "success");
        } catch (error) {
          setStatus("起動失敗: " + String(error), "error");
        }
      });

      createTagsFileButton.addEventListener("click", async () => {
        setCreatingTagsFile(true);

        try {
          const existsResult = await window.go.main.App.CheckTagsFileExists();
          if (!existsResult.success) {
            await showInfoDialog(existsResult.message);
            return;
          }

          if (existsResult.exists) {
            const confirmed = await confirmOverwrite();
            if (!confirmed) {
              return;
            }
          }

          const createResult = await window.go.main.App.CreateTagsFileFromURL(tagsFileURLInput.value);
          if (!createResult.success) {
            await showInfoDialog(createResult.message);
            return;
          }

          await showInfoDialog("タグファイルを保存しました");
        } catch (error) {
          await showInfoDialog("タグファイル作成に失敗しました: " + String(error));
        } finally {
          setCreatingTagsFile(false);
        }
      });

      (async () => {
        hideQRCode();
        await loadSavedComfyUIURL();
        await loadDefaultTagsFileURL();
        await connectComfyUI({ auto: true });
      })();
    </script>
  </body>
</html>
