# 画像を出力するノード（通常はKSampler）
output_node_id: 14

# 絶対に必要な設定
required:
  -
    id: "positive"
    workflow:
      search_type: "title"
      search_value: "Positive"
      input_name: "prompt"
  -
    id: "negative"
    workflow:
      search_type: "title"
      search_value: "Negative"
      input_name: "prompt"
  -
    id: "checkpoint"
    workflow:
      search_type: "id"
      search_value: 10
      input_name: "ckpt_name"
  -
    id: "seed"
    workflow:
      search_type: "class_type"
      search_value: "D2 KSampler"
      input_name: "seed"

# 追加ノード
optional:
  -
    id: "load_image"
    input:
      title: "Load Image"
      type: "image"
      value: ""
    workflow:
      search_type: "class_type"
      search_value: "D2 Load Image"
      input_name: "image_path"
  -
    id: "denoise"
    input:
      title: "Denoise Strength"
      type: "number"
      default: 1
    workflow:
      search_type: "class_type"
      search_value: "D2 KSampler"
      input_name: "denoise"
  -
    id: "size_preset"
    input:
      title: "Image Size Preset"
      type: "list"
      value: ["D2 Image Resize", "input", "required", preset, 0]
    workflow:
      search_type: "class_type"
      search_value: "D2 Image Resize"
      input_name: "preset"
  -
    id: "width"
    input:
      title: "Width"
      type: "number"
      default: 1024
    workflow:
      search_type: "class_type"
      search_value: "D2 Image Resize"
      input_name: "resize_width"
  -
    id: "height"
    input:
      title: "Height"
      type: "number"
      default: 1024
    workflow:
      search_type: "class_type"
      search_value: "D2 Image Resize"
      input_name: "resize_height"
  -
    id: "positive_quality"
    input:
      title: "Positive Quality"
      type: "textarea"
      default: "masterpiece, best quality, absurdres, newest"
    workflow:
      search_type: "title"
      search_value: "Positive Quality"
      input_name: "string_a"
  -
    id: "negative_quality"
    input:
      title: "Negative Quality"
      type: "textarea"
      default: "bad quality, worst quality, worst detail, sketch, censor, text, speech_bubble, watermark"
    workflow:
      search_type: "title"
      search_value: "Negative Quality"
      input_name: "string_b"
  -
    id: "image_format"
    input:
      title: "Image Format"
      type: "list"
      value: ["D2 Save Image Eagle", "input", "required", "format", 0]
    workflow:
      search_type: "class_type"
      search_value: "D2 Save Image Eagle"
      input_name: "format"
  -
    id: "memo"
    input:
      title: "Memo"
      type: "text"
    workflow:
      search_type: "class_type"
      search_value: "D2 Save Image Eagle"
      input_name: "memo_text"


