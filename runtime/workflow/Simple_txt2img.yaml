# 画像を出力するノード（通常はKSampler）
output_node_id: 3

# 絶対に必要な設定
required:
  -
    id: "positive"
    workflow:
      search_type: "title"
      search_value: "Positive"
      input_name: "text"
  -
    id: "negative"
    workflow:
      search_type: "title"
      search_value: "Negative"
      input_name: "text"
  -
    id: "checkpoint"
    workflow:
      search_type: "id"
      search_value: 4
      input_name: "ckpt_name"
  -
    id: "seed"
    workflow:
      search_type: "class_type"
      search_value: "KSampler"
      input_name: "seed"

# 追加ノード
optional:
  -
    id: "width"
    input:
      title: "Width"
      type: "number"
      default: 1024
    workflow:
      search_type: "class_type"
      search_value: "EmptyLatentImage"
      input_name: "width"
  -
    id: "height"
    input:
      title: "Height"
      type: "number"
      default: 1024
    workflow:
      search_type: "class_type"
      search_value: "EmptyLatentImage"
      input_name: "height"


